<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="valentine.css">
    <title>Zalina Envelope</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="envelope-container">
        <img src="envelope.png" alt="Envelope" id="envelope">
        <p style="font-size: 1.8rem; color: #d81b60; margin-top: 20px;"> Click the Envelope! </p>
    </div>

    <div id="letter-container">
        <div class="letter-window">
            <h1 id="letter-title">Will you make manty tomorrow ahah🥩👩‍🍳? </h1>

            <img src="cat.png" class="cat" id="letter-cat" alt="Cute Cat">

            <div class="buttons" id="letter-buttons">
                <img src="yes.png" class="btn yes-btn" alt="Yes">
                <div class="no-wrapper">
                    <img src="no.png" class="btn no-btn" alt="No">
                </div>
            </div>

            <div id="final-text" class="final-text" style="display: none;">
                Can't wait for the manty! See you tomorrow! 🥰
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
